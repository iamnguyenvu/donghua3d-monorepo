name: Donghua3D CI pipeline

on:
  push:
    branches: [ main, nguyenvu ]
  pull_request:
    branches: [ main ]

jobs:
  backend-validation:
    name: Backend Lint & Compilation Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Compile TypeScript (Verification)
        run: |
          cd backend
          npm run build

  frontend-validation:
    name: Frontend Lint & Compilation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Compile Next.js & TypeScript Verification
        run: |
          cd frontend
          npx tsc --noEmit
