name: Donghua3D Production Deployment

on:
  push:
    branches: [ main ]

jobs:
  validate:
    name: Lint & Compile Validation Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Validate Backend
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Compile Backend TypeScript
        run: |
          cd backend
          npm run build

      # Validate Frontend
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Run Frontend Lint
        run: |
          cd frontend
          npm run lint

      - name: Verify Frontend Strict Types
        run: |
          cd frontend
          npx tsc --noEmit

  deploy:
    name: Deploy to VPS Server via SSH
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Secure Cryptographic Diagnostics for Secrets
        run: |
          echo "==== Cryptographic Diagnostics (No values leaked) ===="
          echo "VPS_HOST length: ${#VPS_HOST} chars"
          echo "VPS_USER length: ${#VPS_USER} chars"
          echo "VPS_SSH_KEY length: ${#VPS_SSH_KEY} chars"
          
          # Check for illegal surrounding quotes in secrets
          if [[ "$VPS_HOST" == \"*\" || "$VPS_HOST" == \'*\' ]]; then
            echo "::error:: SECURITY ALERT: VPS_HOST has illegal surrounding quotes! Please remove quotes in GitHub Secrets."
          fi
          if [[ "$VPS_USER" == \"*\" || "$VPS_USER" == \'*\' ]]; then
            echo "::error:: SECURITY ALERT: VPS_USER has illegal surrounding quotes! Please remove quotes in GitHub Secrets."
          fi
          if [[ "$VPS_SSH_KEY" == \"*\" || "$VPS_SSH_KEY" == \'*\' ]]; then
            echo "::error:: SECURITY ALERT: VPS_SSH_KEY has illegal surrounding quotes! Please remove quotes in GitHub Secrets."
          fi
          
          # Check for SSH key validity and integrity
          if [[ "$VPS_SSH_KEY" == *'-----BEGIN'* && "$VPS_SSH_KEY" == *'-----END'* ]]; then
            echo "SUCCESS: SSH Private Key headers and footers are verified and intact."
          else
            echo "::error:: FORMAT ALERT: VPS_SSH_KEY is missing -----BEGIN ----- or -----END ----- headers/footers! Please re-copy the key exactly from your file."
          fi
          echo "======================================================="
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Clean Obsolete Source Files on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "=== VPS PRE-SHUTDOWN DIAGNOSTICS ===" > /tmp/vps_diagnostics.txt
            date >> /tmp/vps_diagnostics.txt
            free -m >> /tmp/vps_diagnostics.txt
            df -h >> /tmp/vps_diagnostics.txt
            echo "=== DOCKER PS BEFORE DEPLOY ===" >> /tmp/vps_diagnostics.txt
            docker ps -a >> /tmp/vps_diagnostics.txt
            
            # Check networks
            echo "=== DOCKER NETWORKS ===" >> /tmp/vps_diagnostics.txt
            docker network ls >> /tmp/vps_diagnostics.txt
            
            # Check compose logs of existing containers if folder exists
            if [ -d /home/ubuntu/donghua3d ]; then
              cd /home/ubuntu/donghua3d
              echo "=== EXISTING COMPOSE PS ===" >> /tmp/vps_diagnostics.txt
              docker compose ps >> /tmp/vps_diagnostics.txt
              echo "=== EXISTING FRONTEND LOGS ===" >> /tmp/vps_diagnostics.txt
              docker compose logs --tail=100 frontend >> /tmp/vps_diagnostics.txt 2>/dev/null || true
              echo "=== EXISTING BACKEND LOGS ===" >> /tmp/vps_diagnostics.txt
              docker compose logs --tail=100 backend >> /tmp/vps_diagnostics.txt 2>/dev/null || true
            fi
            
            # Now clean the directory
            mkdir -p /home/ubuntu/donghua3d
            cd /home/ubuntu/donghua3d
            rm -rf backend frontend nginx docker-compose.yml

      - name: Copy Repository Files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "backend/**,frontend/**,nginx/**,docker-compose.yml"
          target: "/home/ubuntu/donghua3d"

      - name: Execute Remote SSH Commands for Rolling Deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          envs: DATABASE_URL,JWT_SECRET
          script: |
            # Navigate to project working directory in user's home space
            cd /home/ubuntu/donghua3d
            
            # Initialize diagnostics output file
            echo "=== VPS DEPLOYMENT EXECUTION LOG ===" > diagnostics.txt
            date >> diagnostics.txt
            
            # Write dynamic server .env configuration safely
            cat <<EOF > backend/.env
            DATABASE_URL="$DATABASE_URL"
            PORT=5000
            JWT_SECRET="$JWT_SECRET"
            STORAGE_PROVIDER="LOCAL"
            UPLOAD_DIR="/app/uploads"
            CLIENT_URL="https://donghua3d.me"
            EOF
            
            # Write frontend production public variable configurations
            cat <<EOF > frontend/.env.production
            NEXT_PUBLIC_API_URL="https://donghua3d.me/api"
            EOF
            
            # === OOM Prevention: Create swap file if not exists ===
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi
            sudo swapon /swapfile 2>/dev/null || true
            
            # === Stop existing containers to free RAM for build ===
            docker compose down || true
            
            # === Prune old images/cache first to free disk ===
            docker image prune -f
            docker builder prune -f 2>/dev/null || true
            
            # Copy pre-shutdown diagnostics into public folder for static build
            mkdir -p frontend/public
            if [ -f /tmp/vps_diagnostics.txt ]; then
              cp /tmp/vps_diagnostics.txt frontend/public/diagnostics.txt
            else
              echo "No pre-shutdown diagnostics found" > frontend/public/diagnostics.txt
            fi

            # === Build containers ONE BY ONE to avoid OOM ===
            docker compose build db redis nginx
            docker compose build backend
            docker compose build frontend
            
            # === Start everything ===
            docker compose up -d
            
            # Wait for database container to boot completely
            sleep 8
            
            # Force schema sync in the backend container
            docker compose exec -T backend npx prisma db push --accept-data-loss
            
            # Backfill any legacy records with newly introduced slugs
            docker compose exec -T backend node dist/scripts/backfill_movie_slugs.js
            
            # Backfill weekly release days for interactive calendar
            docker compose exec -T backend node dist/scripts/backfill_airing_days.js
            
            # Prune obsolete images to reclaim server disk space
            docker image prune -f

            echo "=== SYSTEM DIAGNOSTICS ===" >> diagnostics.txt
            free -m >> diagnostics.txt
            df -h >> diagnostics.txt
            echo "=== DOCKER PS ===" >> diagnostics.txt
            docker ps -a >> diagnostics.txt
            echo "=== DOCKER COMPOSE PS ===" >> diagnostics.txt
            docker compose ps >> diagnostics.txt
            echo "=== FRONTEND CONTAINER LOGS ===" >> diagnostics.txt
            docker compose logs --tail=150 frontend >> diagnostics.txt
            echo "=== BACKEND CONTAINER LOGS ===" >> diagnostics.txt
            docker compose logs --tail=150 backend >> diagnostics.txt
            echo "=== NGINX CONTAINER LOGS ===" >> diagnostics.txt
            docker compose logs --tail=150 nginx >> diagnostics.txt
            
            docker cp diagnostics.txt donghua3d_backend:/app/uploads/diagnostics.txt
            rm -f diagnostics.txt

      - name: Git Pull, Commit and Push Diagnostics
        continue-on-error: true
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B main origin/main
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          echo "${{ secrets.VPS_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ssh -i private_key.pem "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "cat /tmp/vps_diagnostics.txt" > vps_diagnostics.log
          echo "" >> vps_diagnostics.log
          echo "==========================================================================" >> vps_diagnostics.log
          echo "=== VPS POST-DEPLOYMENT DIAGNOSTICS ===" >> vps_diagnostics.log
          echo "==========================================================================" >> vps_diagnostics.log
          echo "" >> vps_diagnostics.log
          ssh -i private_key.pem "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "cat /home/ubuntu/donghua3d/diagnostics.txt 2>/dev/null || echo 'No post-deploy diagnostics found'" >> vps_diagnostics.log
          git add vps_diagnostics.log
          git commit -m "chore: update vps diagnostics log [skip ci]" || exit 0
          git push origin main
