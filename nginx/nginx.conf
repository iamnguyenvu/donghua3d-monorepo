user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logger Setup
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access_log.log main;

    # Performance Tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream Definitions
    upstream frontend_upstream {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend_upstream {
        server backend:5000;
        keepalive 32;
    }

    # Microcache Setup
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m use_temp_path=off;

    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # Direct Static Video & Thumbnail Serving
        location /static/uploads/ {
            alias /usr/share/nginx/html/static/uploads/;
            sendfile on;
            tcp_nopush on;
            expires 7d;
            add_header Cache-Control "public, no-transform, max-age=604800";
            
            # CORS Headers for Video Streaming (Ensures video players on other devices can play)
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range,DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type' always;
            
            # Handle HLS playlists and segments specific cache
            location ~* \.m3u8$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate" always;
                add_header 'Access-Control-Allow-Origin' '*' always;
                expires -1;
            }
            location ~* \.ts$ {
                expires 30d;
                add_header Cache-Control "public, max-age=2592000" always;
                add_header 'Access-Control-Allow-Origin' '*' always;
            }
        }

        # Backend API Proxying
        location /api/ {
            proxy_pass http://backend_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Enable Microcaching for GET public endpoints (movies, ratings, tiers)
            location ~* /api/movies($|\?) {
                proxy_cache api_cache;
                proxy_cache_valid 200 1s; # 1-second microcache to block spikes
                proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
                proxy_cache_lock on;
                proxy_pass http://backend_upstream/;
            }
        }

        # Next.js Frontend Serving
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
