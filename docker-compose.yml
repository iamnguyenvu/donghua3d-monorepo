version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: donghua3d_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-donghua_db_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-production_secure_db_password_hash_2026}
      POSTGRES_DB: ${POSTGRES_DB:-donghua_prod_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-donghua_db_admin} -d ${POSTGRES_DB:-donghua_prod_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: donghua3d_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-donghua_db_admin}:${POSTGRES_PASSWORD:-production_secure_db_password_hash_2026}@db:5432/${POSTGRES_DB:-donghua_prod_db}?schema=public&connection_limit=10
      JWT_SECRET: ${JWT_SECRET:-production_secure_jwt_secret_key_2026_donghua}
      STORAGE_PROVIDER: "LOCAL"
      UPLOAD_DIR: "/app/uploads"
      CLIENT_URL: "http://localhost"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
      - shared_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: donghua3d_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost/api"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: donghua3d_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - shared_uploads:/usr/share/nginx/html/static/uploads
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
    driver: local
  shared_uploads:
    driver: local
